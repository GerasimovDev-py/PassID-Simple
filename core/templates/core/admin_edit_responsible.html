{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0" style="border-radius: 20px;">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Редактирование ответственного</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Новый пароль (оставьте пустым, чтобы не менять)</label>
                        <input type="text" name="password" class="form-control" placeholder="Новый пароль">
                        <small class="text-muted">Если нужно сменить пароль - введите новый</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">ФИО ответственного</label>
                        <input type="text" name="full_name" class="form-control" value="{{ profile.responsible_full_name }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" value="{{ profile.responsible_phone }}" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">Сохранить</button>
                        <a href="{% url 'admin_access' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

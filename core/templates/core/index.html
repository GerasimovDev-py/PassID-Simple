{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center mb-5">
        <h1 class="display-3 fw-bold" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            PassID
        </h1>
        <p class="text-muted">Интеллектуальная система управления доступом</p>
    </div>

    <div class="row g-4 w-100 justify-content-center" style="max-width: 1000px;">
        
        <div class="col-md-4">
            <a href="{% url 'visitor_form' %}" class="btn-passid w-100 d-block text-center text-decoration-none">
                <div class="py-4">
                    <span class="d-block fs-4">ПОЛУЧИТЬ ПРОПУСК</span>
                    <small class="opacity-75">Для гостей и посетителей</small>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="{% url 'check_status' %}" class="btn w-100 d-block text-center text-decoration-none border-0 shadow-sm bg-white" 
               style="border-radius: 16px; transition: 0.3s; height: 100%;">
                <div class="py-4 text-dark">
                    <span class="d-block fs-4 fw-bold text-secondary">ПРОВЕРИТЬ СТАТУС</span>
                    <small class="text-muted">По серии и номеру паспорта</small>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="{% url 'staff_login' %}" class="btn w-100 d-block text-center text-decoration-none border-0 shadow-sm bg-white" 
               style="border-radius: 16px; transition: 0.3s; height: 100%;">
                <div class="py-4 text-dark">
                    <span class="d-block fs-4 fw-bold text-secondary">ВХОД СОТРУДНИКА</span>
                    <small class="text-muted">Личный кабинет охраны</small>
                </div>
            </a>
        </div>

    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PassID - Система пропусков</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Твой CSS код здесь */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 40px 0; }
        
        .form-control, .form-select {
            border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; transition: all 0.3s ease;
        }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        
        .request-item {
            background: white; border: 2px solid #e2e8f0; border-radius: 16px; padding: 20px;
            margin-bottom: 16px; transition: all 0.3s ease; animation: slideIn 0.3s ease forwards;
        }
        /* Статус "Ожидание" (Красный/Оранжевый левый борт) */
        .request-item.pending { border-left: 5px solid #f5576c; }
        /* Статус "Одобрено" (Зеленый левый борт) */
        .request-item.approved { border-left: 5px solid #48bb78; background: #f0fff4; }

        .btn-passid {
            background: var(--primary-gradient); color: white; border: none;
            border-radius: 12px; padding: 14px 28px; font-weight: 600; transition: all 0.3s ease;
        }
        .btn-passid:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); color: white; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center" style="min-height: 70vh;">
    <div class="col-md-6">
        <div class="request-item bg-white p-5">
            <h3 class="fw-bold mb-4 text-center">Отследить статус пропуска</h3>
            <p class="text-muted text-center mb-4">
                Введите серию и номер паспорта, которые указывали при подаче заявки
            </p>
            
            <form method="POST" action="{% url 'status_result' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Серия и номер паспорта</label>
                    <input type="text" name="passport" class="form-control text-center" 
                           placeholder="0000 000000" required>
                </div>
                <button type="submit" class="btn-passid w-100">
                    ПРОВЕРИТЬ СТАТУС
                </button>
            </form>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mt-3 text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}

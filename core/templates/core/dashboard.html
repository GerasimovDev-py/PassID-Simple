{% extends 'core/base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold text-dark">Панель охраны PassID</h1>
    <a href="{% url 'index' %}" class="btn btn-outline-secondary">Выход</a>
</div>


<div class="mb-4">
    <a href="?tab=active" class="btn {% if request.GET.tab != 'archive' %}btn-primary{% else %}btn-outline-primary{% endif %}">
        Активные заявки
    </a>
    <a href="?tab=archive" class="btn {% if request.GET.tab == 'archive' %}btn-primary{% else %}btn-outline-primary{% endif %}">
        Архив
    </a>
</div>

<div class="row">
    {% if request.GET.tab == 'archive' %}
        <div id="archive-list">
            {% include 'core/dashboard_partial_archive.html' %}
        </div>
    {% else %}
        <div id="active-list">
            {% include 'core/dashboard_partial_active.html' %}
        </div>
    {% endif %}
</div>

<script>
function markDeparted(pk) {
    if (!confirm('Отметить посетителя как ушедшего?')) {
        return;
    }


    const form = document.createElement('form');
    form.method = 'POST';
    form.action = `/departed/${pk}/`;
    
    const csrf = document.createElement('input');
    csrf.type = 'hidden';
    csrf.name = 'csrfmiddlewaretoken';
    csrf.value = '{{ csrf_token }}';
    form.appendChild(csrf);
    
    document.body.appendChild(form);
    form.submit();
}


function updateActive() {
    fetch("{% url 'dashboard_partial' %}?tab=active")
        .then(response => response.text())
        .then(html => {
            document.getElementById('active-list').innerHTML = html;
        });
}

setInterval(updateActive, 5000);
window.addEventListener('load', updateActive);
</script>

{% endblock %}

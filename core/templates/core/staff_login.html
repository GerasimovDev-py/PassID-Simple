{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="request-item bg-white p-5">
            <h3 class="fw-bold mb-4 text-center">Авторизация</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Ключ сотрудника</label>
                    <input type="password" name="token" class="form-control text-center" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-passid w-100">ВОЙТИ В СИСТЕМУ</button>
            </form>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mt-3 small text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

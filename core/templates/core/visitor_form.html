{% extends 'core/base.html' %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
            <div class="row g-0">
                <div class="col-md-7 p-5 bg-white">
                    <h2 class="mb-4 fw-bold">Регистрация в PassID</h2>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">ФИО полностью</label>
                            <input type="text" name="full_name" class="form-control" placeholder="Иванов Иван Иванович" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Тип документа</label>
                                <select name="document_type" class="form-select" required>
                                    <option value="passport_rf">Паспорт РФ</option>
                                    <option value="international_passport">Загранпаспорт</option>
                                    <option value="driver_license">Водительское удостоверение</option>
                                    <option value="other">Другой документ</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Номер документа</label>
                                <input type="text" name="document_number" class="form-control" placeholder="4500 123456" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-calendar3 me-2"></i>Пропуск будет действовать до:
                            </label>
                            <input type="text" 
                                   id="valid_until" 
                                   name="valid_until" 
                                   class="form-control" 
                                   placeholder="Выберите дату и время" 
                                   required>
                        </div>
                </div>
                
                <div class="col-md-5 p-5" style="background: #f8fafc; border-left: 1px solid #edf2f7;">
                    <div class="d-flex align-items-center mb-4">
                        <span class="request-department">СОПРОВОЖДАЮЩИЙ</span>
                    </div>
                    <p class="text-muted small mb-4">Выберите человека, который уже находится на объекте.</p>
                    
                    <select name="escort" class="form-select mb-3" required>
                        <option value="" disabled selected>Выберите сопровождающего</option>
                        {% for person in escorts %}
                        <option value="{{ person.id }}">{{ person.full_name }}</option>
                        {% endfor %}
                    </select>

                    <div class="mb-4">
                        <label class="form-label">Телефон сопровождающего</label>
                        <input type="text" name="escort_phone" class="form-control" placeholder="+7 (___) ___-__-__" required>
                    </div>
                    
                    <button type="submit" class="btn-passid w-100 mt-3">
                        СФОРМИРОВАТЬ ЗАПРОС НА ДОПУСК
                    </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    flatpickr("#valid_until", {
        enableTime: true,
        time_24hr: true,
        dateFormat: "d.m.Y H:i",
        minDate: "today",
        defaultHour: 18,
        defaultMinute: 0,
        locale: "ru",
        allowInput: true
    });
</script>

{% endblock %}
